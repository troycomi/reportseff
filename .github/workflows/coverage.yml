name: Coverage
on: [push, pull_request]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.10"

      - name: Run Tests and Coverage
        # We use 'uvx' to run poe without adding it to the project's dev-deps.
        # This replaces the entire nox/poetry workflow.
        run: |
          uvx --from poethepoet poe tests
          uvx --from poethepoet poe coverage
